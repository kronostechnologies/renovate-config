name: Renovate checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-renovate:
    name: Check Renovate files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: equisoft-actions/with-asdf-vm@v2
      - run: make check.renovate
