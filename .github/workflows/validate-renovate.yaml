name: Renovate checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-renovate:
    name: Check Renovate files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: equisoft-actions/with-asdf-vm@v2
      - run: make check.renovate
