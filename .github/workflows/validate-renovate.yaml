name: Renovate checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-renovate:
    name: Check Renovate files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: equisoft-actions/with-asdf-vm@v2
      - run: make check.renovate
